# Local reproduction of the Railway `OpenRemoteGPS` environment after the
# 2026-04-24 refactor. Single service (Traccar) with an embedded H2 DB and
# a sidecar cron-like backup loop — mirrors the Railway `startCommand`
# override documented in services/traccar/SOURCE.md.
#
# Start:     docker compose up -d
# Stop:      docker compose down
# Wipe:      docker compose down -v    (drops traccar-data — loses the H2 DB)
# One-off backup:  docker compose exec traccar /opt/traccar/data/run_backup.sh

name: traccar-gps

services:
  traccar:
    image: traccar/traccar:latest
    environment:
      TZ: ${TZ:-Europe/Bucharest}
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-traccar}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      TRACCAR_HOST: ${TRACCAR_HOST:-0.0.0.0}
      TRACCAR_PORT: ${TRACCAR_PORT:-8082}
      PORT: ${PORT:-8082}
      GPS_PORT: ${GPS_PORT:-5027}
    volumes:
      - traccar-data:/opt/traccar/data
    ports:
      - "8082:8082"         # Web UI / REST
      - "5027:5027"         # Teltonika Codec 8/8E TCP
    # Override entrypoint with the same wrapper we use on Railway: write
    # traccar.xml with H2 + AUTO_SERVER, install the backup script, spawn
    # the nightly loop, then exec the JVM.
    entrypoint:
      - sh
      - -c
      - |
        cat > /opt/traccar/conf/traccar.xml <<'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE properties SYSTEM "http://java.sun.com/dtd/properties.dtd">
        <properties>
        <entry key="database.driver">org.h2.Driver</entry>
        <entry key="database.url">jdbc:h2:./data/database;AUTO_SERVER=TRUE</entry>
        <entry key="database.user">sa</entry>
        <entry key="database.password"></entry>
        </properties>
        EOF
        mkdir -p /opt/traccar/data/backup
        cat > /opt/traccar/data/run_backup.sh <<'BSCRIPT'
        #!/bin/sh
        set -e
        ts=$(date -u +%Y%m%d_%H%M%S)
        sql=/opt/traccar/data/backup/traccar_${ts}.sql
        /opt/traccar/jre/bin/java -cp '/opt/traccar/lib/*' org.h2.tools.Script -url 'jdbc:h2:/opt/traccar/data/database;AUTO_SERVER=TRUE' -user sa -script "$sql"
        gzip "$sql"
        find /opt/traccar/data/backup -name 'traccar_*.sql.gz' -mtime +14 -delete 2>/dev/null || true
        echo "$(date -u +%FT%TZ) backup ok size=$(stat -c%s "${sql}.gz" 2>/dev/null || echo 0)B file=${sql}.gz" >> /opt/traccar/data/backup/backup.log
        BSCRIPT
        chmod +x /opt/traccar/data/run_backup.sh
        (
          sleep 180
          while true; do
            now=$(date -u +%s)
            target=$(date -u -d 'today 02:00' +%s 2>/dev/null || echo 0)
            if [ "$target" -le "$now" ]; then target=$((target + 86400)); fi
            sleep_s=$((target - now))
            sleep "$sleep_s"
            /opt/traccar/data/run_backup.sh >> /opt/traccar/data/backup/backup.log 2>&1 || echo "$(date -u +%FT%TZ) backup FAILED" >> /opt/traccar/data/backup/backup.log
            sleep 60
          done
        ) &
        exec /opt/traccar/jre/bin/java -jar tracker-server.jar conf/traccar.xml
    restart: unless-stopped

volumes:
  traccar-data:
