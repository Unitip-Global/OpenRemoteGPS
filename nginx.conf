events {
    worker_connections 1024;
}

http {
    # One resolver supporting both Railway private IPv6 (*.railway.internal)
    # and public IPv4 (for upstream map tile service). nginx allows only one
    # resolver per scope and uses all listed nameservers in parallel.
    resolver [fd12::10] 1.1.1.1 8.8.8.8 ipv6=on valid=300s;

    # WebSocket-aware Connection header: "upgrade" only when client asked for it,
    # "close" otherwise. Without this, every request carried Connection: upgrade,
    # which breaks keep-alive and confuses non-WS responses.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;

        location /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Map vector tiles — the baked manager mbtiles only covers the
        # Netherlands (27 MB). Serve OpenFreeMap planet tiles instead
        # (free, no API key, OpenMapTiles schema so the OSM Liberty
        # style layers already configured on the manager still render).
        #
        # OpenFreeMap publishes planet tiles under a dated path that
        # rolls ~monthly. The `/planet/{z}/{x}/{y}.pbf` alias without a
        # version returns empty tiles, so we hardcode the current dated
        # path. Check `https://tiles.openfreemap.org/planet` TileJSON to
        # find the latest version and bump this string when it changes.
        set $ofm_version "20260415_001001_pt";
        location ~ ^/api/[^/]+/map/tile/(\d+)/(\d+)/(\d+)$ {
            set $tile_host "tiles.openfreemap.org";
            proxy_pass https://$tile_host/planet/$ofm_version/$1/$2/$3.pbf;
            proxy_set_header Host tiles.openfreemap.org;
            proxy_ssl_server_name on;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            # Aggressive browser cache — tiles rarely change.
            add_header Cache-Control "public, max-age=86400" always;
            add_header Access-Control-Allow-Origin * always;
        }

        location /auth {
            set $keycloak_upstream http://keycloak.railway.internal:8080;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Upstream may emit http:// Location headers because it doesn't
            # trust X-Forwarded-Proto. Rewrite the scheme so the browser
            # doesn't take an extra HTTP→HTTPS hop through the edge.
            proxy_redirect http:// https://;
        }

        location / {
            set $manager_upstream http://manager.railway.internal:8080;
            proxy_pass $manager_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Rewrite upstream http:// redirects to https:// — OpenRemote manager
            # emits its own Host-based redirect URLs over HTTP.
            proxy_redirect http:// https://;

            # WebSocket support for OpenRemote
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
