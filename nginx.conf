events {}

http {
    resolver 100.64.0.1 valid=10s ipv6=off;

    server {
        listen 8080;

        location /auth {
            set $upstream_keycloak http://keycloak.railway.internal:8080;
            proxy_pass $upstream_keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }

        location / {
            set $upstream_manager http://manager.railway.internal:8080;
            proxy_pass $upstream_manager;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }
    }
}