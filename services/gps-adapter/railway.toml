# Railway service: GPS-Adapter  (Go — bridges Traccar <-> OpenRemote)
# Service id: 2ffd86b7-c234-4f18-9156-1c5fe8112ff3
# Private URL: http://gps-adapter.railway.internal:8080

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
region = "us-east4-eqdc4a"
