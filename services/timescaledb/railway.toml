# Railway service: timescaledb  (Postgres for everything)
# Service id: bbf66508-c19e-40a9-9ff4-18f220ba1997
# Private URL: timescaledb.railway.internal:5432
# Volume: timescaledb-volume-l4FW -> /pgdata

[build]
builder = "RAILPACK"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
region = "us-east4-eqdc4a"

# Volume mount (Railway manages the volume; this documents it)
# requiredMountPath = "/pgdata"
